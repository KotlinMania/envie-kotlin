org.gradle.jvmargs=-Xmx8g -XX:MaxMetaspaceSize=1g
kotlin.daemon.jvmargs=-Xmx8g

# Silence the per-link-task "w: The number of threads 4 is more than the
# number of processors 3" warning that fires on macos-latest free-tier
# runners (3 vCPU) when K/N's default of 4 backend codegen threads
# exceeds the host CPU count. `0` means "one thread per processor core"
# — adapts to whatever runner builds. The freeCompilerArgs +=
# "-Xbackend-threads=0" path does NOT work: the Kotlin Gradle plugin
# internally appends its own -Xbackend-threads=4 to link tasks after
# user args, producing a "passed multiple times. Only the last value
# will be used: 4" warning that still fails -Werror. The plugin reads
# this gradle.properties knob and uses it as THE value, not as an
# additional arg. See workspace CLAUDE.md "Kotlin/Native backend-thread
# warnings on CI runners" for the full rationale.
kotlin.native.parallelThreads=0
