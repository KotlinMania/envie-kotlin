name: CodeQL

# CodeQL for envie-kotlin (Kotlin Multiplatform).
#
# `actions` covers workflow files. `javascript-typescript` covers the vendored
# karma-webpack package and karma.config.d files. `java-kotlin` runs in
# `manual` mode because:
#   - `autobuild` invokes `./gradlew testClasses`, a JVM-style task that
#     doesn't exist in this KMP project (no JVM target).
#   - `build-mode: none` produces no extractable artifacts for KMP, so
#     the extractor exits with "could not process any code written in
#     Java/Kotlin".
# The manual build below runs `compileAndroidMain`, which is the one KMP
# compilation in this repo that emits real JVM `.class` files (via the
# `com.android.kotlin.multiplatform.library` plugin). That's the compile
# path CodeQL's Kotlin extractor (an LD_PRELOAD tracer hooking JVM kotlinc
# exec) can ingest.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "27 4 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none
          - language: java-kotlin
            build-mode: manual

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        if: matrix.build-mode == 'manual'
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        if: matrix.build-mode == 'manual'
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Compile Android Kotlin (JVM bytecode) for CodeQL extraction
        if: matrix.build-mode == 'manual'
        shell: bash
        # `compileAndroidMain` is the only compilation in this KMP project that
        # emits real JVM `.class` files (under `build/classes/kotlin/android/main`).
        # The `com.android.kotlin.multiplatform.library` plugin runs the JVM
        # `kotlinc` for the Android target, which is exactly what the CodeQL
        # Kotlin extractor's LD_PRELOAD tracer can hook.
        #
        # `--rerun-tasks` defeats Gradle's up-to-date check and `--no-build-cache`
        # disables cache hits restored by setup-gradle, ensuring kotlinc is
        # actually invoked so the tracer has something to hook.
        #
        # `kotlin.compiler.execution.strategy=out-of-process` spawns a fresh
        # kotlinc JVM per compilation (instead of the long-lived `daemon`
        # default or function-call `in-process` mode). CodeQL's LD_PRELOAD
        # tracer hooks new process invocations, so out-of-process gives it a
        # process exec to intercept.
        run: |
          ./gradlew compileAndroidMain \
            --rerun-tasks \
            --no-build-cache \
            -Pkotlin.compiler.execution.strategy=out-of-process \
            --no-configuration-cache \
            --no-daemon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
